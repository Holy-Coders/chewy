name: Release & Update Formula

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"

      - name: Check if tag exists
        id: check_tag
        run: |
          if git ls-remote --tags origin "v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/v${VERSION}.tar.gz"
          sleep 5
          SHA=$(curl -sL "$URL" | shasum -a 256 | awk '{print $1}')

          git clone https://x-access-token:${TAP_TOKEN}@github.com/Holy-Coders/homebrew-chewy.git tap
          cd tap

          # Copy the full formula from source, then set the correct url/version/sha256
          cp "$GITHUB_WORKSPACE/Formula/chewy.rb" Formula/chewy.rb
          cp "$GITHUB_WORKSPACE/Formula/sd-cpp.rb" Formula/sd-cpp.rb
          sed -i "s|url \".*chewy.*tar.gz\"|url \"${URL}\"|" Formula/chewy.rb
          sed -i "s|sha256 \"PLACEHOLDER\"|sha256 \"${SHA}\"|" Formula/chewy.rb
          sed -i "s|version \".*\"|version \"${VERSION}\"|" Formula/chewy.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git diff --cached --quiet || git commit -m "Update chewy to v${VERSION}"
          git push
